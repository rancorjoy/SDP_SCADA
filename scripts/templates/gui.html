<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #controls {
      padding: 8px;
      background: #eee;
    }

    #plot-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .plot {
      flex: 1;
      min-height: 0;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="controls">
    Y Min: <input id="plt-ymin" type="number">
    Y Max: <input id="plt-ymax" type="number">
    <button onclick="plotApplyYBounds()">Apply</button>
  </div>

  <div id="plot-wrap">
    <div id="plot-analog" class="plot"></div>
    <div id="plot-bool" class="plot"></div>
  </div>
</div>

<script>
function initPlots() {
  const analogData = [{
    x: [1,2,3,4],
    y: [1,3,2,4],
    mode: 'lines'
  }];

  const boolData = [{
    x: [1,2,3,4],
    y: [0,1,0,1],
    mode: 'lines'
  }];

  Plotly.newPlot('plot-analog', analogData, {
    margin: { t: 20 }
  });

  Plotly.newPlot('plot-bool', boolData, {
    margin: { t: 20 },
    yaxis: {
      range: [-0.1, 1.1],
      tickvals: [0,1]
    }
  });
}

function plotApplyYBounds() {
  const ymin = parseFloat(document.getElementById('plt-ymin').value);
  const ymax = parseFloat(document.getElementById('plt-ymax').value);

  const update = {};

  if (!isNaN(ymin) && !isNaN(ymax)) {
    update['yaxis.range'] = [ymin, ymax];
  } else {
    update['yaxis.autorange'] = true;
  }

  Plotly.relayout('plot-analog', update);

  if (!isNaN(ymin) && !isNaN(ymax) && ymin <= 0 && ymax >= 1) {
    Plotly.relayout('plot-bool', update);
  }
}

// Critical fix: wait until layout is ready
requestAnimationFrame(() => {
  initPlots();
});
</script>

</body>
</html>
